# Application Configuration
spring.application.name=apigateway
server.port=8080

# Database Configuration (H2 for testing)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for testing)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000
spring.redis.database=0

# Logging
logging.level.root=INFO
logging.level.com.apigateway=INFO

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.downstreamService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.downstreamService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.downstreamService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.downstreamService.waitDurationInOpenState=10000

# Eureka Client Configuration (disable for local development)
eureka.client.enabled=false
