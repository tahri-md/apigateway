spring.application.name=apigateway

# Logging Configuration
logging.level.root=INFO
logging.level.com.apigateway=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.downstreamService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.downstreamService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.downstreamService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.downstreamService.waitDurationInOpenState=10000

