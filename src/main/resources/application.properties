# Application Configuration
spring.application.name=apigateway
server.port=8080

# Database Configuration (H2 for testing)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for testing)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000
spring.redis.database=0

# Logging
logging.level.root=INFO
logging.level.com.apigateway=INFO

# JWT Configuration
app.jwt.secret=your-secret-key-change-this-in-production-minimum-32-characters-required
app.jwt.expiration=86400000

# Security
server.ssl.enabled=false

# Actuator & Health Endpoints
management.endpoints.web.exposure.include=health,metrics,prometheus,info,threaddump
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoints.web.base-path=/actuator
management.endpoints.web.path-mapping.prometheus=prometheus

# Metrics Configuration
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=apigateway

# Logging Configuration
logging.level.root=INFO
logging.level.com.apigateway=INFO
logging.level.com.apigateway.security=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/apigateway.log
logging.file.max-size=10MB
logging.file.max-history=30

# Distributed Tracing - Micrometer with OpenTelemetry
management.tracing.sampling.probability=1.0
otel.traces.exporter=otlp
otel.exporter.otlp.protocol=http/protobuf
otel.exporter.otlp.endpoint=http://localhost:4317

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.downstreamService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.downstreamService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.downstreamService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.downstreamService.waitDurationInOpenState=10000

# Eureka Client Configuration (disable for local development)
eureka.client.enabled=false
