# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/apigateway
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=mysql

# JPA Configuration for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Configuration
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000
spring.redis.database=0

# Logging
logging.level.root=INFO
logging.level.com.apigateway=INFO

# JWT Configuration
app.jwt.secret=your-secret-key-change-this-in-production-minimum-32-characters-required
app.jwt.expiration=86400000

# Security
server.ssl.enabled=false

# Actuator & Health Endpoints
management.endpoints.web.exposure.include=health,metrics,prometheus,info,threaddump
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
