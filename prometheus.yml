global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'apigateway'

scrape_configs:
  - job_name: 'apigateway'
    static_configs:
      - targets: ['apigateway:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
